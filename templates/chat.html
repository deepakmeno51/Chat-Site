<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Room | Chat Site</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        var socket = io();
        let username;
        let roomName;
        let typingTimer;
        const TYPING_INTERVAL = 500;
        let selectedRecipient = null;

        socket.on('connect', function() {
            console.log('Connected to the server!');

            const urlParams = new URLSearchParams(window.location.search);
            username = urlParams.get('username');
            sessionStorage.setItem('chatUsername', username);

            roomName = prompt('Enter chat room name:');
            if (roomName) {
                socket.emit('join_room', { username: username, room: roomName });
                document.getElementById('roomNameDisplay').textContent = roomName;
            } else {
                alert('Please enter a chat room name.');
                window.location.href = '/';
            }
        });

        socket.on('disconnect', function() {
            console.log('Disconnected from the server.');
        });

        socket.on('register_error', function(data) {
            alert(data.message || 'Server error');
        });

        socket.on('new_message', function(data) {
            displayMessage(data.sender, data.message, data.private);
        });

        socket.on('user_list_update', function(userList) {
            updateUserList(userList);
        });

        socket.on('typing', function(data) {
            displayTypingIndicator(data.username);
        });

        socket.on('stopped_typing', function(data) {
            clearTypingIndicator(data.username);
        });

        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            if (message && username && roomName) {
                if (selectedRecipient) {
                    socket.emit('send_message', {
                        message: message,
                        room: roomName,
                        recipient: selectedRecipient,
                        private: true
                    });
                } else {
                    socket.emit('send_message', { message: message, room: roomName, private: false });
                }
                messageInput.value = '';
                stoppedTyping();
            }
        }

        function displayMessage(sender, message, isPrivate) {
            const messagesList = document.getElementById('messages');
            const li = document.createElement('li');

            const senderLabel = document.createElement('strong');
            senderLabel.textContent = sender + ': ';

            const messageBody = document.createElement('span');
            // `message` is markdown rendered server-side; preserve intended formatting.
            messageBody.innerHTML = message;

            li.appendChild(senderLabel);
            li.appendChild(messageBody);

            if (sender === sessionStorage.getItem('chatUsername')) {
                li.classList.add('sent');
            } else {
                li.classList.add('received');
            }

            if (isPrivate) {
                li.classList.add('private');
            }

            messagesList.appendChild(li);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function updateUserList(userList) {
            const userListElement = document.getElementById('userList');
            userListElement.innerHTML = '';

            for (const usernameInList in userList) {
                if (Object.prototype.hasOwnProperty.call(userList, usernameInList) && usernameInList !== username) {
                    const status = userList[usernameInList];
                    const li = document.createElement('li');
                    li.dataset.username = usernameInList;
                    li.textContent = usernameInList + ' (' + status + ')';
                    li.addEventListener('click', function() {
                        selectRecipient(usernameInList);
                    });
                    userListElement.appendChild(li);
                }
            }
        }

        function startTyping() {
            if (!typingTimer) {
                socket.emit('typing', { username: username, room: roomName });
                typingTimer = setTimeout(stoppedTyping, TYPING_INTERVAL);
            } else {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(stoppedTyping, TYPING_INTERVAL);
            }
        }

        function stoppedTyping() {
            clearTimeout(typingTimer);
            typingTimer = null;
            socket.emit('stopped_typing', { username: username, room: roomName });
        }

        function displayTypingIndicator(user) {
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.textContent = user + ' is typing...';
        }

        function clearTypingIndicator(user) {
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.textContent = '';
        }

        function selectRecipient(recipient) {
            selectedRecipient = recipient;
            document.getElementById('privateIndicator').textContent = 'Private message with ' + recipient;

            const allUsers = document.querySelectorAll('#userList li');
            allUsers.forEach(function(userItem) {
                userItem.classList.remove('selected');
                if (userItem.dataset.username === recipient) {
                    userItem.classList.add('selected');
                }
            });
        }

        window.onload = function() {
            const messagesList = document.getElementById('messages');
            messagesList.scrollTop = messagesList.scrollHeight;
        };

        function quitChat() {
            socket.emit('quit_chat', { username: username });
            window.location.href = '/';
        }

    </script>
</head>
<body class="chat-page">
    <header class="chat-header">
        <div>
            <p class="eyebrow">Connected as <span id="usernameDisplay"></span></p>
            <h1>Chat Room</h1>
        </div>
        <div class="room-pill">Room: <span id="roomNameDisplay">—</span></div>
    </header>

    <div id="chatContainer">
        <aside class="panel users-panel">
            <h2>Online Users</h2>
            <p class="panel-note">Select a user to send a private message.</p>
            <ul id="userList"></ul>
        </aside>

        <section id="chatBox" class="panel">
            <div class="chat-toolbar">
                <div id="privateIndicator">Public chat</div>
                <button id="quitButton" onclick="quitChat()">Quit</button>
            </div>

            <ul id="messages"></ul>
            <div id="typingIndicator"></div>

            <div id="inputArea">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Write a message..."
                    oninput="startTyping()"
                    onkeydown="if (event.keyCode == 13) { sendMessage(); return false; }"
                />
                <button id="sendButton" onclick="sendMessage()">Send</button>
            </div>
        </section>
    </div>

    <script>
        document.getElementById('usernameDisplay').textContent = new URLSearchParams(window.location.search).get('username') || 'guest';
    </script>
</body>
</html>
