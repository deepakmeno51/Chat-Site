<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Chat Site</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        var socket = io();

        socket.on('connect', function() {
            console.log('Connected to the server!');
        });

        socket.on('disconnect', function() {
            console.log('Disconnected from the server.');
            displayError('Disconnected from server. Please refresh.');
        });
        
        socket.on('connect_error', function(err) {
            console.error('Socket connection failed:', err);
            displayError('Unable to connect to chat server.');
        });

        socket.on('login_success', function(data) {
            window.location.href = '/chat?username=' + encodeURIComponent(data.username);
        });

        // Maintained 'login_error' to match your Python backend updates
        socket.on('login_error', function(data) {
            displayError(data.error || 'Unable to register.');
        });

        function register() {
            const usernameInput = document.getElementById('usernameInput');
            const username = usernameInput.value.trim();
            
            if (!socket.connected) {
                displayError('Still connecting to server. Please try again.');
                return;
            }

            if (username) {
                socket.emit('register', { username: username });
                hideError();
            } else {
                displayError('Please enter a username.');
            }
        }

        function displayError(message) {
            const errorDiv = document.getElementById('errorDisplay');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            const errorDiv = document.getElementById('errorDisplay');
            errorDiv.style.display = 'none';
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                register();
            }
        });
    </script>
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            <p class="eyebrow">Realtime Messaging</p>
            <h1>Welcome to Chat Site</h1>
            <p class="subtitle">Pick a username to jump into a room and start chatting instantly.</p>

            <label for="usernameInput">Username</label>
            <input type="text" id="usernameInput" placeholder="e.g. codex_dev" autocomplete="off" />

            <button onclick="register()">Enter Chat</button>
            <div id="errorDisplay" role="alert" style="display: none;"></div>
        </section>
    </main>
</body>
</html>
