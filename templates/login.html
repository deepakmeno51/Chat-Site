<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Chat Site</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        var socket = io();

        socket.on('connect', function() { console.log('Connected!'); });
        socket.on('disconnect', function() { displayError('Disconnected. Please refresh.'); });
        socket.on('connect_error', function() { displayError('Unable to connect to chat server.'); });

        socket.on('login_success', function(data) {
            window.location.href = '/chat?username=' + encodeURIComponent(data.username);
        });
        socket.on('login_error', function(data) {
            displayError(data.error || 'Unable to register.');
            setLoading(false);
        });

        function register() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!socket.connected) { displayError('Still connecting. Please try again.'); return; }
            if (!username) { displayError('Please enter a username.'); return; }
            if (username.length > 30) { displayError('Username must be 30 characters or fewer.'); return; }
            hideError();
            setLoading(true);
            socket.emit('register', { username: username });
        }

        function setLoading(on) {
            const btn = document.getElementById('enterBtn');
            btn.disabled = on;
            btn.textContent = on ? 'Connecting\u2026' : 'Enter Chat';
        }

        function displayError(msg) {
            const el = document.getElementById('errorDisplay');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError() { document.getElementById('errorDisplay').style.display = 'none'; }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); register(); }
        });
    </script>
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            <p class="eyebrow">Realtime Messaging</p>
            <h1>Welcome to Chat Site</h1>
            <p class="subtitle">Pick a username to jump into a room and start chatting instantly.</p>
            <label for="usernameInput">Username</label>
            <input type="text" id="usernameInput" placeholder="e.g. codex_dev" autocomplete="off" maxlength="30" />
            <button id="enterBtn" onclick="register()">Enter Chat</button>
            <div id="errorDisplay" role="alert" style="display:none;"></div>
        </section>
    </main>
</body>
</html>
