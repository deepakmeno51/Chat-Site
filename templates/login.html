<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Chat Site</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            <p class="eyebrow">Realtime Messaging</p>
            <h1>Chat Site</h1>
            <p class="subtitle">Sign in to your account or create a new one.</p>

            {% if error %}
            <div class="error-banner" role="alert">{{ error }}</div>
            {% endif %}

            <!-- Tab switcher -->
            <div class="tab-row">
                <button type="button" class="tab active" onclick="switchTab('login')">Sign In</button>
                <button type="button" class="tab" onclick="switchTab('register')">Create Account</button>
            </div>

            <!-- Login form -->
            <form id="loginForm" method="POST" action="/login">
                <input type="hidden" name="action" value="login" />
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" name="username" placeholder="your_username" autocomplete="username" maxlength="30" required />
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" placeholder="••••••••" autocomplete="current-password" required />
                <button type="submit" class="primary-btn">Sign In</button>
            </form>

            <!-- Register form (hidden initially) -->
            <form id="registerForm" method="POST" action="/login" style="display:none;">
                <input type="hidden" name="action" value="register" />
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" name="username" placeholder="pick_a_username" autocomplete="username" maxlength="30" required />
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" name="password" placeholder="choose a strong password" autocomplete="new-password" required />
                <label for="regConfirm">Confirm Password</label>
                <input type="password" id="regConfirm" placeholder="repeat password" autocomplete="new-password" required />
                <p id="confirmError" class="field-error"></p>
                <button type="submit" class="primary-btn" onclick="return checkPasswords()">Create Account</button>
            </form>
        </section>
    </main>

    <script>
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
        }

        function checkPasswords() {
            const pw  = document.getElementById('regPassword').value;
            const cfm = document.getElementById('regConfirm').value;
            if (pw !== cfm) {
                document.getElementById('confirmError').textContent = 'Passwords do not match.';
                return false;
            }
            document.getElementById('confirmError').textContent = '';
            return true;
        }

        // If there was a server error, show whichever form was submitted
        const action = document.querySelector('input[name="action"]');
        {% if error %}
        // keep the active tab that was submitted
        const submitted = '{{ request.form.get("action", "login") }}';
        if (submitted === 'register') switchTab('register');
        {% endif %}
    </script>
</body>
</html>
